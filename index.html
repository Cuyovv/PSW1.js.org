<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Calculator</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        .calc-container { border: 2px solid #333; display: inline-block; padding: 20px; border-radius: 10px; background: white; }
        input { width: 50px; padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #ccc; }
        select { padding: 10px; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2rem; color: #333; }
    </style>
</head>
<body>

    <div class="calc-container">
        <h2>Simple JS Calculator</h2>
        <input type="number" id="num1" placeholder="0">
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        <input type="number" id="num2" placeholder="0">
        <br>
        <button onclick="runCalculation()">Calculate</button>
        <div id="result">Result: --</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
